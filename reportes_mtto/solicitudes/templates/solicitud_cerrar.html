{% extends 'base.html' %}

{% block content %}

<!-- Formulario para cerrar una solicitud, donde se solicita al usuario que ingrese el trabajo realizado y las observaciones de cierre. -->
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-7">

            <div class="card shadow-sm border-0">
                <div class="card-body">

                    <h3 class="mb-4">Cerrar solicitud</h3>

                    {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">
                                Trabajo realizado
                            </label>
                            <textarea 
                                name="trabajo_realizado" 
                                class="form-control" 
                                rows="4" 
                                required>{{ request.POST.trabajo_realizado }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Observaciones de cierre
                            </label>
                            <textarea 
                                name="observaciones_cierre" 
                                class="form-control" 
                                rows="4">{{ request.POST.observaciones_cierre }}</textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a href="{% url 'solicitudes:editar' solicitud.id %}" class="btn btn-secondary">
                                Cancelar
                            </a>

                            <button type="submit" class="btn btn-danger">
                                Confirmar cierre
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
