{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <h3>Cerrar solicitud</h3>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">
                Trabajo realizado
            </label>
            <textarea name="trabajo_realizado" class="form-control" rows="4" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">
                Observaciones de cierre
            </label>
            <textarea name="observaciones_cierre" class="form-control" rows="4"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"> Confirmar cierre </button>
            <a href="{% url 'solicitudes:editar' solicitud.id %}" class="btn btn-secondary">
                Cancelar
            </a>
        </div>
    </form>
</div>

{% endblock %}
