{% extends "base.html" %}

{% block content %}
<!-- Template para el formulario de creación y edición de componentes, con campos para nombre, marca, modelo, fecha de adquisición, descripción y estado operativo. Incluye validación de datos y mensajes de error. -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <div>
                            <h3 class="mb-1">{{ titulo }}</h3>
                            {% if activo_padre %}
                                <small class="text-muted">
                                    <i class="bi bi-ship me-1"></i>{{ activo_padre }}
                                    {% if sistema_padre %}
                                        <i class="bi bi-chevron-right mx-1"></i>
                                        <i class="bi bi-gear-fill me-1"></i>{{ sistema_padre }}
                                    {% endif %}
                                </small>
                            {% endif %}
                        </div>
                        <a href="{% url 'activos:lista_activos' %}" class="btn-close" aria-label="Volver"></a>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            {{ form.nombre }}
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Marca</label>
                                {{ form.marca }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Modelo</label>
                                {{ form.modelo }}
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            {{ form.descripcion }}
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">{{ btn_texto }}</button>
                            <a href="{% url 'activos:lista_activos' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
