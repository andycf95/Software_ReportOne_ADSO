{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h4>{{ titulo }}</h4>
                    <small class="text-muted">
                        <i class="bi bi-ship me-1"></i>{{ activo_padre }}
                    </small>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Nombre</label>
                            {{ form.nombre }}
                        </div>
                        <div class="mb-3">
                            <label>Tipo de sistema</label>
                            {{ form.tipo_sistema }}
                        </div>
                        <div class="mb-3">
                            <label>Descripción</label>
                            {{ form.descripcion }}
                        </div>
                        <button type="submit" class="btn btn-primary">{{ btn_texto }}</button>
                        <a href="{% url 'activos:lista_activos' %}" class="btn btn-secondary">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
