<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes de mantenimeinto 2.0</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <!-- Logo / título -->
        <a class="navbar-brand" href="/"> Sistema MTTO </a>

        <!-- Botón responsive -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menú -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"> Inicio </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#"> Solicitudes </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'solicitudes:create' %}"> Crear Solicitud </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'contacto' %}"> Contacto </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    {% block content %} {% endblock %}

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-3 mt-5">
      <div class="container">
        <p class="mb-1">
          &copy; 2026 Sistema de Mantenimiento. Todos los derechos reservados.
        </p>
      </div>
    </footer>
  </body>
</html>
